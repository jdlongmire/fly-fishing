<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<div id="soho-map" style="height:420px;border-radius:.5rem;margin:1rem 0;z-index:0;"></div>
<p style="font-size:.82rem;color:#666;margin-top:-.5rem;">
  Verified public reference points (dam → weirs → Bluff City). More access points and ramps will be added as coordinates are confirmed.
</p>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(function(){
  var data = {{ site.data.soho_access | jsonify }};
  var map = L.map('soho-map', { scrollWheelZoom:false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);

  var base = "{{ '/' | relative_url }}".replace(/\/$/,'');
  var latlngs = [];
  data.features.forEach(function(f){
    var c = f.geometry.coordinates, ll = [c[1], c[0]];
    latlngs.push(ll);
    var p = f.properties;
    var href = p.url ? base + p.url : null;
    var html = '<strong>' + p.name + '</strong>' +
      (p.section ? '<br><em>' + p.section + ' section</em>' : '') +
      (p.note ? '<br>' + p.note : '') +
      (href ? '<br><a href="' + href + '">Details →</a>' : '');
    L.marker(ll).addTo(map).bindPopup(html);
  });
  if (latlngs.length > 1) { map.fitBounds(latlngs, { padding:[40,40] }); }
  else { map.setView(latlngs[0] || [36.50,-82.17], 11); }
})();
</script>
